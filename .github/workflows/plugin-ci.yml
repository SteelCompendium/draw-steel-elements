name: Plugin CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # engines requires >=22.15; 24 also gives jest native TS-config loading.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hard gate (F3 OD-6): flipped once `npm run tsc` went green (D1, Vue removal
      # complete) — was informational-only (continue-on-error: true) while TS-1
      # (failing type-check) was outstanding.
      - name: Type check
        run: npm run tsc

      # NOTE: no lint step yet — eslint is not installable in this repo (F3 BT-3).
      # Add `npm run lint` here when BT-3 lands.

      - name: Test
        run: npm test -- --ci

      - name: Bundle must build
        run: npm run build-no-check
