# D7 Task 3 (spec §4.1) — the ds-resource block schema (AJV, hard-fail per F1 §5).
# `class` is an open string (not an enum locked to the 9 known classes) — an
# unrecognized/absent class still validates and falls back to the generic resource
# (resourceByClass.ts's resolveResource). `type`/`min` are explicit-override seams (spec
# §4.1's resolveResource "merges class defaults with explicit type/min") — authors only
# ever need `class` for a fully class-aware block; `type`/`min` exist for homebrew or a
# class the static table doesn't yet cover.
# Dialect: 2019-09 like every other element schema (Ajv2019; an unregistered $schema URI
# throws at compile).
$schema: "https://json-schema.org/draft/2019-09/schema"
$id: "https://steelcompendium.io/schemas/dse-resource-1.0.0"
type: object
additionalProperties: false
required: [current]
properties:
  class:
    type: string
    minLength: 1
    description: Class key (e.g. "fury", "talent") looked up in RESOURCE_BY_CLASS. Unrecognized values fall back to a generic resource.
  type:
    type: string
    minLength: 1
    description: Explicit resource-name override. Absent = the class's default name (or "Resource" if unrecognized/absent).
  current:
    type: number
    description: Signed — Talent's Clarity can go negative ("strained", spec §1.2).
  min:
    type: number
    description: Explicit floor override. Absent = the class's default floor (0, except Talent).
  max:
    type: number
    description: Optional ceiling. Absent = unbounded.
