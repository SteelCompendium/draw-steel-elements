content: "A [supernatural](scc.v1:mcdm.heroes.v1/rule.general/supernatural) spirit who has taken the form of a specific small animal or animated object has chosen to be your [familiar](scc.v1:mcdm.heroes.v1/perk/familiar)—or to adopt you as their [familiar](scc.v1:mcdm.heroes.v1/perk/familiar).\n\nThe spirit uses the [familiar](scc.v1:mcdm.heroes.v1/perk/familiar) stat block.\n\nThe [familiar](scc.v1:mcdm.heroes.v1/perk/familiar) can hold small objects in their mouth or claws, but can't perform activities that would typically require hands (opening a door, unrolling a scroll, and so forth). They can't harm other creatures or objects. They can flank in combat, but only with you.\n\nIf your [familiar](scc.v1:mcdm.heroes.v1/perk/familiar) is destroyed, you can restore them as a [respite](scc.v1:mcdm.heroes.v1/rule.resource/respite) activity, or by spending a [Recovery](scc.v1:mcdm.heroes.v1/rule.health/recoveries) as a main action to bring them back into existence in an unoccupied space [adjacent](scc.v1:mcdm.heroes.v1/rule.combat/adjacent) to you.\n\n###### Familiar Statblock\n\n**[Familiar](scc.v1:mcdm.heroes.v1/perk/familiar)**\n\n|      [Familiar](scc.v1:mcdm.heroes.v1/perk/familiar)       |         -         |           Level -            |           -           |         EV -         |\n|:-------------------:|:-----------------:|:----------------------------:|:---------------------:|:--------------------:|\n|   **1T**<br>[Size](scc.v1:mcdm.heroes.v1/rule.character/size)    |  **5**<br>[Speed](scc.v1:mcdm.heroes.v1/rule.character/speed)   | **2x your level**<br>[Stamina](scc.v1:mcdm.heroes.v1/rule.health/stamina) |  **0**<br>[Stability](scc.v1:mcdm.heroes.v1/rule.character/stability)   | **-**<br>[Free Strike](scc.v1:mcdm.heroes.v1/feature.common.main-actions/free-strike) |\n| **-**<br>Immunities | **-**<br>Movement |                              | **-**<br>With Captain | **-**<br>Weaknesses  |\n|   **-3**<br>[Might](scc.v1:mcdm.heroes.v1/rule.character/might)   | **+2**<br>[Agility](scc.v1:mcdm.heroes.v1/rule.character/agility) |       **0**<br>[Reason](scc.v1:mcdm.heroes.v1/rule.character/reason)        |  **0**<br>[Intuition](scc.v1:mcdm.heroes.v1/rule.character/intuition)   |  **+1**<br>[Presence](scc.v1:mcdm.heroes.v1/rule.character/presence)  |\n\n> **Telepathic**\n> \n> While you and your [familiar](scc.v1:mcdm.heroes.v1/perk/familiar) are within 10 squares of each other, you can communicate telepathically and share each other's senses. While sharing senses, each of you also benefits from your own senses at the same time."
flavor: A supernatural spirit who has taken the form of a specific small animal or animated object has chosen to be your familiar—or to adopt you as their familiar.
name: Familiar
scc: mcdm.heroes.v1/perk/familiar
type: perk
