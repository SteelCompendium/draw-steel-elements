average_potency: '[Reason](scc.v1:mcdm.heroes.v1/rule.character/reason) − 1'
content: |-
    Strategist. Defender. Leader. With weapon in hand, you lead allies into the maw of battle, barking out commands that inspire your fellow heroes to move faster and strike more precisely. All the while, you stand between your compatriots and death, taunting the [followers](scc.v1:mcdm.heroes.v1/rule.general/follower) of evil to best you if they can.

    **As a [tactician](scc.v1:mcdm.heroes.v1/class/tactician), you have abilities that heal your allies and grant them increased damage, movement, and attacks, even as you leave your enemies struggling to respond.**

    > "Your line is broken, Varrox! Your wizard is dead. Hahah! You should have negotiated!"
    >
    > **Sir John of Tor**

    ### Basics

    **Starting [Characteristics](scc.v1:mcdm.heroes.v1/rule.character/characteristic):** You start with a [Might](scc.v1:mcdm.heroes.v1/rule.character/might) of 2 and a [Reason](scc.v1:mcdm.heroes.v1/rule.character/reason) of 2, and you can choose one of the following arrays for your other [characteristic](scc.v1:mcdm.heroes.v1/rule.character/characteristic) scores:

    - 2, −1, −1
    - 1, 1, −1
    - 1, 0, 0

    **Weak [Potency](scc.v1:mcdm.heroes.v1/rule.character/potency):** [Reason](scc.v1:mcdm.heroes.v1/rule.character/reason) − 2

    **Average [Potency](scc.v1:mcdm.heroes.v1/rule.character/potency):** [Reason](scc.v1:mcdm.heroes.v1/rule.character/reason) − 1

    **Strong [Potency](scc.v1:mcdm.heroes.v1/rule.character/potency):** [Reason](scc.v1:mcdm.heroes.v1/rule.character/reason)

    **Starting [Stamina](scc.v1:mcdm.heroes.v1/rule.health/stamina) at 1st Level:** 21

    **[Stamina](scc.v1:mcdm.heroes.v1/rule.health/stamina) Gained at 2nd and Higher Levels:** 9

    **[Recoveries](scc.v1:mcdm.heroes.v1/rule.health/recoveries):** 10

    **Skills:** You gain the [Lead](scc.v1:mcdm.heroes.v1/skill.interpersonal/lead) skill (see Skills in Chapter 9: [Tests](scc.v1:mcdm.heroes.v1/chapter/tests)). Then choose any two skills from Alertness, Architecture, Blacksmithing, Brag, Culture, Empathize, Fletching, Mechanics, Monsters, Search, Strategy, or the skills of the [exploration skill group](scc.v1:mcdm.heroes.v1/skill.group/exploration). (*Quick Build:* Lead, Monsters, Strategy.)

    ###### Tactician Advancement Table

    | Level | Features                                                                                                                    | Abilities      | Doctrine Abilities |
    |-------|-----------------------------------------------------------------------------------------------------------------------------|----------------|--------------------|
    | 1st   | [Tactical Doctrine](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/tactical-doctrine), [Focus](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/focus), [Doctrine Feature](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/1st-level-doctrine-feature), [Doctrine Triggered Action](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/doctrine-triggered-action), [Field Arsenal](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/field-arsenal), [Mark](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/mark), [Strike Now](scc.v1:mcdm.heroes.v1/feature.ability.tactician.level-1/strike-now), [Tactician Abilities](scc.v1:mcdm.heroes.v1/feature.tactician.level-1/tactician-abilities) | 3, 5           | -                  |
    | 2nd   | [Perk](scc.v1:mcdm.heroes.v1/feature.tactician.level-2/perk), [Doctrine Feature](scc.v1:mcdm.heroes.v1/feature.tactician.level-2/2nd-level-doctrine-feature), [Doctrine Ability](scc.v1:mcdm.heroes.v1/feature.tactician.level-2/2nd-level-doctrine-ability)                                                                                    | 3, 5           | 5                  |
    | 3rd   | [Out of Position](scc.v1:mcdm.heroes.v1/feature.tactician.level-3/out-of-position), [7-Focus Ability](scc.v1:mcdm.heroes.v1/feature.tactician.level-3/7-focus-ability)                                                                                            | 3, 5, 7        | 5                  |
    | 4th   | [Characteristic Increase](scc.v1:mcdm.heroes.v1/feature.tactician.level-4/characteristic-increase), [Focus on Their Weakness](scc.v1:mcdm.heroes.v1/feature.tactician.level-4/focus-on-their-weaknesses), [Improved Field Arsenal](scc.v1:mcdm.heroes.v1/feature.tactician.level-4/improved-field-arsenal), [Perk](scc.v1:mcdm.heroes.v1/feature.tactician.level-4/perk), [Skill](scc.v1:mcdm.heroes.v1/feature.tactician.level-4/skill)                                       | 3, 5, 7        | 5                  |
    | 5th   | [Doctrine Feature](scc.v1:mcdm.heroes.v1/feature.tactician.level-5/5th-level-doctrine-features), [9-Focus Ability](scc.v1:mcdm.heroes.v1/feature.tactician.level-5/9-focus-ability)                                                                                           | 3, 5, 7, 9     | 5                  |
    | 6th   | [Master of Arms](scc.v1:mcdm.heroes.v1/feature.tactician.level-6/master-of-arms), [Perk](scc.v1:mcdm.heroes.v1/feature.tactician.level-6/perk), [Doctrine Ability](scc.v1:mcdm.heroes.v1/feature.tactician.level-6/6th-level-doctrine-ability)                                                                                      | 3, 5, 7, 9     | 5, 9               |
    | 7th   | [Characteristic Increase](scc.v1:mcdm.heroes.v1/feature.tactician.level-7/characteristic-increase), [Heightened Focus](scc.v1:mcdm.heroes.v1/feature.tactician.level-7/heightened-focus), [Seize the Initiative](scc.v1:mcdm.heroes.v1/feature.tactician.level-7/seize-the-initiative), [Skill](scc.v1:mcdm.heroes.v1/feature.tactician.level-7/skill), [Doctrine Feature](scc.v1:mcdm.heroes.v1/feature.tactician.level-7/7th-level-doctrine-feature)                                    | 3, 5, 7, 9     | 5, 9               |
    | 8th   | [Perk](scc.v1:mcdm.heroes.v1/feature.tactician.level-8/perk), [Doctrine Feature](scc.v1:mcdm.heroes.v1/feature.tactician.level-8/8th-level-doctrine-feature), [11-Focus Ability](scc.v1:mcdm.heroes.v1/feature.tactician.level-8/11-focus-ability)                                                                                    | 3, 5, 7, 9, 11 | 5, 9               |
    | 9th   | [Grandmaster of Arms](scc.v1:mcdm.heroes.v1/feature.tactician.level-9/grandmaster-of-arms), [Doctrine Ability](scc.v1:mcdm.heroes.v1/feature.tactician.level-9/9th-level-doctrine-ability)                                                                                       | 3, 5, 7, 9, 11 | 5, 9, 11           |
    | 10th  | [Characteristic Increase](scc.v1:mcdm.heroes.v1/feature.tactician.level-10/characteristic-increase), [Command](scc.v1:mcdm.heroes.v1/feature.tactician.level-10/command), [Perk](scc.v1:mcdm.heroes.v1/feature.tactician.level-10/perk), [Skill](scc.v1:mcdm.heroes.v1/feature.tactician.level-10/skill), [True Focus](scc.v1:mcdm.heroes.v1/feature.tactician.level-10/true-focus), [Warmaster](scc.v1:mcdm.heroes.v1/feature.tactician.level-10/warmaster)                                                        | 3, 5, 7, 9, 11 | 5, 9, 11           |
