content: |-
    [Humans](scc.v1:mcdm.heroes.v1/ancestry/human) belong to the world in a way the other speaking peoples do not. You can sense the presence of the [supernatural](scc.v1:mcdm.heroes.v1/rule.general/supernatural)—that... oily smell in the air, as I've heard it described. And the presence of deathless causes the hairs on the back of your neck to stand up. Or why do you think graveyards affect you so? Whatever magic is, its grip on you is light. Whatever drives the deathless, your nature rebels against it.

    "No one knows why this should be. We elves have no such senses. Nor do the elementals or the kanin... the [dwarves](scc.v1:mcdm.heroes.v1/ancestry/dwarf) and the [orcs](scc.v1:mcdm.heroes.v1/ancestry/orc) as you say. What is it that sets [humans](scc.v1:mcdm.heroes.v1/ancestry/human) apart? I am an historian, not a physician. I cannot say. Perhaps some of you will one day find out and teach us all the reason."

    ### On Humans

    So, we arrive here at the end of your first semester of [Human](scc.v1:mcdm.heroes.v1/ancestry/human) Culture. I hope to see you next year in the Caelian Empire course, and though it may be hard to believe now, I often see former students' names in our textbooks years later. Perhaps that will be some of you.

    I will now answer the one question I am asked most often, and which I save answering until the last day of class. What do I think of [humans](scc.v1:mcdm.heroes.v1/ancestry/human)?

    I am a [high elf](scc.v1:mcdm.heroes.v1/ancestry/high-elf), as you deem it in your tongue. A child of the solar celestials. And I have taught this class, mostly to young [humans](scc.v1:mcdm.heroes.v1/ancestry/human), for thirteen centuries. I have seen generations of your people come through this classroom, and that alone would well qualify me to answer this question.

    What do I think of [humans](scc.v1:mcdm.heroes.v1/ancestry/human)? Well, I will tell you.

    I was here, teaching this class during the fire of Chaos 373. The fire *leveled this city*. Can you imagine that? Can you imagine the heat, the death, destruction that such a thing causes?

    *Six months* after the Great Fire, your ancestors had rebuilt... everything. I have seen many miracles in my life. Witnessing that feat might be chief among them.

    Liches are almost always [humans](scc.v1:mcdm.heroes.v1/ancestry/human). Did you know that? I think I know why. Your lives are so short—almost as soon as you're born, you're thinking about [dying](scc.v1:mcdm.heroes.v1/rule.health/dying), and you refuse to yield.

    That refusal to yield to death... to *death*... is what drives you, I think. Drives you to leave the world better than you found it. Causes ruined people to rebuild great city.

    We studied [human](scc.v1:mcdm.heroes.v1/ancestry/human) history in this room. Did you feel that those great ancestors of yours were perhaps made of finer stuff than you? Do not think thus. I knew them, and I know you, and your future is greater. I sometimes think each [human](scc.v1:mcdm.heroes.v1/ancestry/human) generation greater than the last—more courageous, more generous. Quicker to forgive.

    Today, Ajax's name is on everyone's tongue, but we learned of many great evils that plagued this world. We met the Pharaoh Khorsekef, desperate, his power failing, as he opened the Great Tet and drank of the time stored there, becoming the Ultralich. He was defeated, and now rules the Necropolitan Ruin in the Abyssal Waste.

    We watched Cthrion Uroniziir try to reduce the timescape into one singular universe, wiping out reality as we know it. She was defeated, and we see her cage every day.1

    Each of these great evils was defeated by a coalition. The armies and heroes of many speaking peoples. And all of them—all of them—were led... by [humans](scc.v1:mcdm.heroes.v1/ancestry/human). That's a fact. That's history. You can look it up.

    Is there some rare trait that makes you uniquely qualified to lead disparate peoples, bring them together to achieve great things? I think... there must be.

    Those great [humans](scc.v1:mcdm.heroes.v1/ancestry/human), your ancestors, did not focus on differences. They did not *weigh* different people and grade them based on arbitrary traits deemed virtues and flaws. That is what Ajax does. No, those [humans](scc.v1:mcdm.heroes.v1/ancestry/human) focused on the future. On making a better world... for all of us. A world many of them knew they would not live to see. That is a sacrifice... I can scarcely imagine.

    The people who stand against Ajax and tyrants like him will be just like you—normal people. Priests and scholars and merchants and farmers. Maybe even teachers.

    Stopping Ajax will require you to become something else. You must become heroes. [Conduits](scc.v1:mcdm.heroes.v1/class/conduit) of [saints](scc.v1:mcdm.heroes.v1/rule.world/saint), warmasters of great armies. [Censors](scc.v1:mcdm.heroes.v1/class/censor) and [shadows](scc.v1:mcdm.heroes.v1/class/shadow). That may seem unlikely now, but the future has a way of surprising us.

    Some of your names, I will see written in future textbooks. But some of your names, I will see written in the stars.
