content: |-
    *Hi! Remember me?*

    **Prerequisite:** You die at the hands of your greatest foe, that foe still lives, and you aren't a [revenant](scc.v1:mcdm.heroes.v1/ancestry/revenant).

    **Effect:** You are restored to life. You gain the Tough But Withered signature trait from the [revenant](scc.v1:mcdm.heroes.v1/ancestry/revenant) ancestry.
